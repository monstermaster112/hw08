<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>垃圾分类助手</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --recyclable: #2196F3;
    --recyclable-bg: #E3F2FD;
    --hazardous: #F44336;
    --hazardous-bg: #FFEBEE;
    --kitchen: #4CAF50;
    --kitchen-bg: #E8F5E9;
    --other: #78909C;
    --other-bg: #ECEFF1;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  html { font-size: 16px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #f5f7fa;
    color: #2c3e50;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: linear-gradient(135deg, #1a237e, #283593);
    color: #fff;
    padding: 32px 20px 28px;
    text-align: center;
  }
  .header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: 1px; }
  .header p { font-size: 0.88rem; opacity: 0.8; margin-top: 6px; }

  .search-wrap {
    max-width: 520px;
    margin: -24px auto 0;
    padding: 0 16px;
    position: relative;
    z-index: 10;
  }
  .search-box {
    display: flex;
    background: #fff;
    border-radius: var(--radius);
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    overflow: hidden;
  }
  .search-box input {
    flex: 1;
    border: none;
    outline: none;
    padding: 14px 16px;
    font-size: 0.95rem;
    background: transparent;
    color: #333;
  }
  .search-box input::placeholder { color: #aaa; }
  .search-box button {
    background: #3949AB;
    border: none;
    color: #fff;
    padding: 0 20px;
    cursor: pointer;
    font-size: 0.95rem;
    transition: background 0.2s;
  }
  .search-box button:hover { background: #1a237e; }

  .suggestions {
    background: #fff;
    border-radius: 0 0 var(--radius) var(--radius);
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    max-height: 260px;
    overflow-y: auto;
    display: none;
  }
  .suggestions.show { display: block; }
  .suggestions .item {
    padding: 10px 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.9rem;
    transition: background 0.15s;
  }
  .suggestions .item:hover { background: #f5f5f5; }
  .suggestions .item .tag {
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 20px;
    color: #fff;
    white-space: nowrap;
  }

  .result-wrap {
    max-width: 600px;
    margin: 16px auto 0;
    padding: 0 16px;
    display: none;
  }
  .result-wrap.show { display: block; }
  .result-card {
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px;
    text-align: center;
  }
  .result-card .icon { font-size: 3rem; margin-bottom: 8px; }
  .result-card .name { font-size: 1.3rem; font-weight: 700; }
  .result-card .cat-label {
    display: inline-block;
    margin-top: 10px;
    padding: 6px 20px;
    border-radius: 20px;
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
  }
  .result-card .desc { font-size: 0.85rem; color: #666; margin-top: 12px; line-height: 1.5; }
  .result-card .close-btn {
    margin-top: 16px;
    padding: 6px 24px;
    border: 1px solid #ddd;
    border-radius: 20px;
    background: #fff;
    cursor: pointer;
    font-size: 0.85rem;
    color: #666;
    transition: all 0.2s;
  }
  .result-card .close-btn:hover { background: #f5f5f5; border-color: #bbb; }

  .cats {
    max-width: 640px;
    margin: 20px auto 0;
    padding: 0 16px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .cat-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 12px 4px;
    border-radius: var(--radius);
    border: 2px solid transparent;
    background: #fff;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.78rem;
    color: #555;
    line-height: 1.3;
  }
  .cat-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
  .cat-btn.active { border-width: 2px; border-style: solid; background: transparent; box-shadow: none; }
  .cat-btn .dot { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; }

  .items-wrap {
    max-width: 680px;
    margin: 16px auto 40px;
    padding: 0 16px;
    flex: 1;
  }
  .items-wrap .empty-state {
    text-align: center;
    padding: 40px 16px;
    color: #999;
  }
  .items-wrap .empty-state .big-icon { font-size: 3rem; margin-bottom: 10px; }
  .items-wrap .empty-state p { font-size: 0.9rem; }
  .items-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .items-header h2 { font-size: 1.05rem; font-weight: 600; color: #444; }
  .items-header .count { font-size: 0.8rem; color: #999; }
  .items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 8px;
  }
  .item-card {
    background: #fff;
    border-radius: 10px;
    padding: 12px 10px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    transition: all 0.15s;
    font-size: 0.88rem;
    color: #444;
  }
  .item-card:hover { transform: translateY(-2px); box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
  .item-card .line { width: 24px; height: 3px; border-radius: 2px; margin: 6px auto 0; }

  .footer {
    text-align: center;
    padding: 16px;
    font-size: 0.78rem;
    color: #aaa;
    border-top: 1px solid #eee;
    margin-top: auto;
  }

  @media (max-width: 480px) {
    .header { padding: 24px 16px 22px; }
    .header h1 { font-size: 1.3rem; }
    .cats { gap: 6px; }
    .cat-btn { font-size: 0.7rem; padding: 10px 2px; }
    .items-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .item-card { font-size: 0.82rem; padding: 10px 6px; }
  }
  @media (max-width: 360px) {
    .items-grid { grid-template-columns: repeat(2, 1fr); }
  }

  
  /* ---- Floating Mic Button ---- */
  .voice-section {
    max-width: 520px;
    margin: 14px auto 0;
    padding: 0 16px;
    text-align: center;
  }
  .mic-btn-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .mic-btn {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #3949AB, #5C6BC0);
    color: #fff;
    font-size: 2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(57, 73, 171, 0.35);
    transition: all 0.3s ease;
    position: relative;
    outline: none;
  }
  .mic-btn::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 2px solid transparent;
    background: linear-gradient(135deg, #3949AB, #F44336, #3949AB) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .mic-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 28px rgba(57, 73, 171, 0.5);
  }
  .mic-btn:active {
    transform: scale(0.95);
  }
  .mic-btn.listening {
    background: linear-gradient(135deg, #E53935, #FF5252);
    box-shadow: 0 4px 28px rgba(229, 57, 53, 0.5);
    animation: mic-pulse 1.4s ease-in-out infinite;
  }
  .mic-btn.listening::after {
    opacity: 1;
    animation: mic-ring 1.4s ease-in-out infinite;
  }
  @keyframes mic-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  @keyframes mic-ring {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.12); }
  }
  .mic-label {
    font-size: 0.78rem;
    color: #888;
    transition: all 0.3s;
  }
  .mic-label.active {
    color: #E53935;
    font-weight: 600;
  }

  .voice-status {
    text-align: center;
    font-size: 0.78rem;
    color: #E53935;
    min-height: 24px;
    line-height: 24px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .voice-status.active {
    opacity: 1;
  }

  .speaker-btn {
    background: transparent;
    border: 1px solid #ddd;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 1rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-left: 10px;
    transition: all 0.2s;
    vertical-align: middle;
  }
  .speaker-btn:hover { background: #f0f0f0; border-color: #bbb; }
::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
</style>
</head>
<body>

<header class="header">
  <h1>♻️ 垃圾分类助手</h1>
  <p>🎤 支持语音识别 · 输入/说出物品名查询分类</p>
</header>

<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索物品名称，如「塑料瓶」「苹果核」…" autocomplete="off">
    <button id="searchBtn">搜索</button>
  </div>
  <div class="suggestions" id="suggestions"></div>
</div>

<div class="voice-section">
  <div class="mic-btn-wrap">
    <button class="mic-btn" id="micBtn" title="点击说话查询分类">🎤</button>
    <span class="mic-label" id="micLabel">点击说话</span>
  </div>
  <div class="voice-status" id="voiceStatus"></div>
</div>

<div class="result-wrap" id="resultWrap">
  <div class="result-card">
    <div class="icon" id="resultIcon"></div>
    <div class="name" id="resultName"></div>
    <div class="cat-label" id="resultLabel"></div>
    <div class="desc" id="resultDesc"></div>
    <button class="close-btn" id="closeResult">关闭</button>
  </div>
</div>

<div class="cats" id="catFilters">
  <button class="cat-btn" data-cat="all">
    <span class="dot" style="background:#607D8B;"></span>
    全部
  </button>
  <button class="cat-btn" data-cat="recyclable">
    <span class="dot" style="background:var(--recyclable);"></span>
    可回收物
  </button>
  <button class="cat-btn" data-cat="hazardous">
    <span class="dot" style="background:var(--hazardous);"></span>
    有害垃圾
  </button>
  <button class="cat-btn" data-cat="kitchen">
    <span class="dot" style="background:var(--kitchen);"></span>
    厨余垃圾
  </button>
  <button class="cat-btn" data-cat="other">
    <span class="dot" style="background:var(--other);"></span>
    其他垃圾
  </button>
</div>

<div class="items-wrap" id="itemsWrap">
  <div class="items-header">
    <h2 id="listTitle">全部物品</h2>
    <span class="count" id="listCount"></span>
  </div>
  <div class="items-grid" id="itemsGrid"></div>
</div>

<footer class="footer">
  数据仅供参考 · 分类标准以当地政策为准
</footer>

<script>
const CATEGORIES = {
  recyclable: { name: '可回收物', color: '#2196F3', icon: '📦', desc: '适宜回收、可循环利用的生活废弃物。包括废纸、废塑料、废金属、废玻璃、废织物等。' },
  hazardous:  { name: '有害垃圾', color: '#F44336', icon: '☣️', desc: '对人体健康或自然环境造成直接或潜在危害的废弃物。包括废电池、废灯管、废药品、废油漆等。' },
  kitchen:    { name: '厨余垃圾', color: '#4CAF50', icon: '🍂', desc: '食材废料、剩菜剩饭、过期食品、瓜皮果核等易腐的生物质生活废弃物。' },
  other:      { name: '其他垃圾', color: '#78909C', icon: '🗑️', desc: '除可回收物、有害垃圾、厨余垃圾以外的其他生活废弃物。' },

let activeCat = 'all';

function getCat(cat) { return CATEGORIES[cat]; }
function getItems(cat) { return cat === 'all' ? ITEMS : ITEMS.filter(i => i.cat === cat); }

function renderGrid(cat) {
  const grid = document.getElementById('itemsGrid');
  const title = document.getElementById('listTitle');
  const count = document.getElementById('listCount');
  const items = getItems(cat);
  if (!items.length) {
    grid.innerHTML = '<div class="empty-state"><div class="big-icon">🔍</div><p>该分类暂无数据</p></div>';
    title.textContent = cat === 'all' ? '全部物品' : CATEGORIES[cat].name;
    count.textContent = '';
    return;
  }
  title.textContent = cat === 'all' ? '全部物品' : CATEGORIES[cat].name;
  count.textContent = '共 ' + items.length + ' 项';
  grid.innerHTML = items.map(item => {
    const c = getCat(item.cat);
    return '<div class="item-card" onclick="showResult(\'' + item.name + '\')">' +
      '<div>' + item.name + '</div>' +
      '<div class="line" style="background:' + c.color + ';"></div></div>';
  }).join('');
}

function setActiveCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(btn => {
    const isActive = btn.dataset.cat === cat;
    btn.classList.toggle('active', isActive);
    if (isActive) {
      const c = cat === 'all' ? '#607D8B' : CATEGORIES[cat].color;
      btn.style.borderColor = c;
    } else {
      btn.style.borderColor = 'transparent';
    }
  });
  renderGrid(cat);
  hideResult();
  hideSuggestions();
}

document.getElementById('catFilters').addEventListener('click', function(e) {
  var btn = e.target.closest('.cat-btn');
  if (btn) setActiveCat(btn.dataset.cat);
});

function findItem(name) {
  for (var i = 0; i < ITEMS.length; i++) {
    if (ITEMS[i].name === name) return ITEMS[i];
  }
  return null;
}

function searchItems(query) {
  if (!query.trim()) return [];
  var q = query.trim().toLowerCase();
  var results = [];
  for (var i = 0; i < ITEMS.length; i++) {
    if (ITEMS[i].name.indexOf(q) !== -1 || ITEMS[i].desc.indexOf(q) !== -1) {
      results.push(ITEMS[i]);
    }
  }
  return results;
}

function showResult(name) {
  var item = findItem(name);
  if (!item) return;
  var c = getCat(item.cat);
  document.getElementById('resultIcon').textContent = c.icon;
  document.getElementById('resultName').textContent = item.name;
  document.getElementById('resultLabel').textContent = c.name;
  document.getElementById('resultLabel').style.background = c.color;
  document.getElementById('resultDesc').textContent = item.desc;
  document.getElementById('resultWrap').classList.add('show');
  document.getElementById('resultWrap').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function hideResult() {
  document.getElementById('resultWrap').classList.remove('show');
}
document.getElementById('closeResult').addEventListener('click', hideResult);

function hideSuggestions() {
  document.getElementById('suggestions').classList.remove('show');
}

function renderSuggestions(query) {
  var el = document.getElementById('suggestions');
  var results = searchItems(query).slice(0, 8);
  if (!results.length) { el.classList.remove('show'); return; }
  var html = '';
  for (var i = 0; i < results.length; i++) {
    var item = results[i];
    var c = getCat(item.cat);
    var idx = item.name.toLowerCase().indexOf(query.toLowerCase());
    var displayName = item.name;
    if (idx !== -1) {
      displayName = item.name.slice(0, idx) + '<strong>' + item.name.slice(idx, idx + query.length) + '</strong>' + item.name.slice(idx + query.length);
    }
    html += '<div class="item" onclick="selectSuggestion(\'' + item.name.replace(/'/g, "\\'") + '\')">' +
      '<span>' + displayName + '</span>' +
      '<span class="tag" style="background:' + c.color + ';">' + c.name + '</span></div>';
  }
  el.innerHTML = html;
  el.classList.add('show');
}

function selectSuggestion(name) {
  document.getElementById('searchInput').value = name;
  hideSuggestions();
  showResult(name);
}

var searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', function(e) {
  var val = e.target.value.trim();
  if (val) renderSuggestions(val);
  else hideSuggestions();
});
searchInput.addEventListener('focus', function(e) {
  var val = e.target.value.trim();
  if (val) renderSuggestions(val);
});
document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-wrap')) hideSuggestions();
});
searchInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    hideSuggestions();
    var val = searchInput.value.trim();
    if (val) {
      var results = searchItems(val);
      if (results.length) showResult(results[0].name);
    }
  }
});

document.getElementById('searchBtn').addEventListener('click', function() {
  hideSuggestions();
  var val = searchInput.value.trim();
  if (val) {
    var results = searchItems(val);
    if (results.length) showResult(results[0].name);
  }
});


// ---- Voice Recognition ----
var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
var recognition = null;
var isListening = false;

function startListening() {
  if (!SpeechRecognition) {
    setVoiceStatus('❌ 当前浏览器不支持语音识别，请使用 Chrome 或 Edge');
    setTimeout(clearVoiceStatus, 3000);
    return;
  }
  if (isListening) return;
  recognition = new SpeechRecognition();
  recognition.lang = 'zh-CN';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  document.getElementById('micBtn').classList.add('listening');
  document.getElementById('micLabel').textContent = '🎤 正在聆听...';
  document.getElementById('micLabel').classList.add('active');
  setVoiceStatus('🎤 请说话，试试说「塑料瓶是什么垃圾」');
  isListening = true;

  recognition.onresult = function(e) {
    var text = e.results[0][0].transcript;
    isListening = false;
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('micLabel').textContent = '✅ 已识别';
    document.getElementById('micLabel').classList.remove('active');
    setVoiceStatus('✅ 识别结果: ' + text);
    setTimeout(clearVoiceStatus, 2000);
    handleVoiceQuery(text);
  };

  recognition.onerror = function(e) {
    isListening = false;
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('micLabel').textContent = '点击说话';
    document.getElementById('micLabel').classList.remove('active');
    if (e.error === 'no-speech') {
      setVoiceStatus('❌ 没有检测到语音，请重试');
    } else if (e.error === 'not-allowed') {
      setVoiceStatus('❌ 麦克风权限被拒绝，请在浏览器设置中允许');
    } else {
      setVoiceStatus('❌ 识别出错: ' + e.error);
    }
    setTimeout(clearVoiceStatus, 3000);
  };

  recognition.onend = function() {
    isListening = false;
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('micLabel').textContent = '点击说话';
    document.getElementById('micLabel').classList.remove('active');
    clearVoiceStatus();
  };

  try {
    recognition.start();
  } catch(e) {
    isListening = false;
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('micLabel').textContent = '点击说话';
    document.getElementById('micLabel').classList.remove('active');
    setVoiceStatus('❌ 启动麦克风失败');
    setTimeout(clearVoiceStatus, 3000);
  }
}

function stopListening() {
  if (recognition && isListening) {
    recognition.stop();
  }
  isListening = false;
  document.getElementById('micBtn').classList.remove('listening');
  document.getElementById('micLabel').textContent = '点击说话';
  document.getElementById('micLabel').classList.remove('active');
  clearVoiceStatus();
}

document.getElementById('micBtn').addEventListener('click', function() {
  if (isListening) {
    stopListening();
  } else {
    startListening();
  }
});

function setVoiceStatus(msg) {
  var el = document.getElementById('voiceStatus');
  el.textContent = msg;
  el.classList.add('active');
}

function clearVoiceStatus() {
  var el = document.getElementById('voiceStatus');
  el.textContent = '';
  el.classList.remove('active');
}

function handleVoiceQuery(text) {
  if (!text) return;
  var clean = parseQuery(text);
  if (clean) {
    document.getElementById('searchInput').value = clean;
    showResult(clean);
    speakResult(clean);
  } else {
    // Try searching the raw text
    var results = searchItems(text);
    if (results.length) {
      document.getElementById('searchInput').value = results[0].name;
      showResult(results[0].name);
      speakResult(results[0].name);
    } else {
      setVoiceStatus('❌ 未识别到物品名称，请重试');
      setTimeout(clearVoiceStatus, 2500);
    }
  }
}

function parseQuery(text) {
  text = text.replace(/[，。？、\s]/g, ' ').trim();
  // Common patterns: xxx是什么垃圾, xxx属于什么垃圾, xxx应该扔到哪里, etc.
  var patterns = [
    /(.+?)是(?:属于|算)?什么垃圾/,
    /(.+?)属于(?:什么|哪类)垃圾/,
    /(.+?)应该扔(?:到|在)?(?:哪个|什么)垃圾桶/,
    /(.+?)怎么(?:分类|扔|处理)/,
    /(.+?)(?:是|算|属于)\S*垃圾/,
    /我想问(.+?)(?:的|是)?/,
    /请问(.+?)(?:的|是|属于)?/,
    /知道(.+?)(?:的|是|属于)?/,
  ];
  for (var i = 0; i < patterns.length; i++) {
    var m = text.match(patterns[i]);
    if (m && m[1]) {
      var name = m[1].trim();
      var item = findItem(name);
      if (item) return name;
    }
  }
  // Check if whole text matches an item
  var item = findItem(text);
  if (item) return text;
  // Try partial match
  for (var i = 0; i < ITEMS.length; i++) {
    if (text.indexOf(ITEMS[i].name) !== -1) {
      return ITEMS[i].name;
    }
  }
  return null;
}

// ---- Text-to-Speech ----
function speakResult(name) {
  var item = findItem(name);
  if (!item) return;
  var cat = getCat(item.cat);
  var msg = name + '属于' + cat.name + '。' + item.desc.replace(/。$/, '');
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    var utter = new SpeechSynthesisUtterance(msg);
    utter.lang = 'zh-CN';
    utter.rate = 0.95;
    utter.pitch = 1.0;
    window.speechSynthesis.speak(utter);
  }
}

document.getElementById('speakerBtn').addEventListener('click', function() {
  var name = document.getElementById('resultName').textContent;
  if (name) speakResult(name);
});

setActiveCat('all');
</script>
